# ===== Development Profile =====
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/cloudvault?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: cloudvault
    password: secret

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 console (useful for quick local testing alongside MySQL — enable if switching to H2)
  h2:
    console:
      enabled: false          # Set to true only when datasource is switched to H2

  flyway:
    enabled: true
    # !! DANGER — DEV/LOCAL USE ONLY !!
    # This will DROP and RECREATE your entire schema on any
    # Flyway checksum mismatch. NEVER set this on a shared
    # dev DB, CI database, or any environment with real data.
    clean-on-validation-error: true

# LocalStack endpoint override (comment out when using real AWS credentials locally)
aws:
  access-key: test
  secret-key: test
  s3:
    endpoint-override: http://localhost:4566

# ===== Logging (verbose for dev) =====
logging:
  level:
    root: DEBUG
    com.cloudvault: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
